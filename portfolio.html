<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 270 Project</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <video autoplay loop muted plays-inline class="vid">
        <source src="video.mp4" type="video/mp4">
    </video>
    <header>
        <h1>My Portfolio</h1>
    </header>

    <nav>
        <ul id="navBar">
            <li class="navLi"><a href='#'>Home</a></li>
            <li class="navLi"><a href='#'>Info</a></li>
            <li class="navLi">
                <label class="theme-switch">
                    <input type="checkbox" id="toggle-theme">
                    <span class="slider"></span>
                    <span class="switch-label">🌙</span>
                </label>
            </li>
        </ul>
    </nav>
    <div class="container">
        <aside>
            <img src="placeholder.avif" id="random">
            <div>
                First Name: Dario <br>
                Last Name: Juric <br>
                University: WKU <br>
                Bachelors in Computer Science
            </div>
        </aside>
        <section>
            <article>
                <h3>My projects</h3>
                <div id="github-projects">Loading projects...</div>
            </article>
        </section>
        <section>
            <article id="github-stats">Loading stats...</article>
        </section>
    </div>

    <footer id="footer">
        <span id="footer-text">Contact Me</span>
        <form id="contact-form" class="hidden">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message" rows="3" required></textarea>
            <div class="form-buttons">
                <button type="submit" id="send-btn">Send</button>
                <button type="button" id="close-form">Cancel</button>
            </div>
        </form>
    </footer>
    <script src="MainFunction.js"></script>
</body>
</html>
